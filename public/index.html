<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Chatbot AI </title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="cloud cloud-one"><span></span></div>
    <div class="cloud cloud-two"></div>
    <div class="cloud cloud-three"><span></span></div>
    <div class="pipe pipe-left"></div>
    <div class="pipe pipe-center"></div>
    <div class="pipe pipe-right"></div>
  </div>

  <div class="container">
    <div class="game-header">
      <h1> RETRO AI CHAT </h1>
      <div class="level-display">LEVEL 14</div>
    </div>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Your message..." autocomplete="off" required />
      <button type="submit">SEND</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
